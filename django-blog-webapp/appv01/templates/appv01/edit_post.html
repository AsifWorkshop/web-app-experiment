{% extends 'appv01/navbar.html' %}
{% load static %}
{% block content %}
<script src="{% static 'edit_post.js' %}" defer></script>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="mb-4 fw-bold">Edit Your Post</h3>
                    
                    <form method="POST" enctype="multipart/form-data" id="editForm">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Title</label>
                            <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Content</label>
                            <textarea name="content" class="form-control" rows="6" required>{{ post.content }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Update Attachment</label>
                            <input type="file" name="attachment" id="imageInput" class="form-control" accept="image/*">
                            
                            <div class="mt-3">
                                <p class="small text-muted mb-1">Preview:</p>
                                <img id="imagePreview" src="{% if post.attachment %}{{ post.attachment.url }}{% endif %}" 
                                     class="img-fluid rounded border" style="max-height: 200px; {% if not post.attachment %}display:none;{% endif %}">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <a href="{% url 'profile' %}" class="text-secondary text-decoration-none">Cancel</a>
                            <button type="submit" id="saveBtn" class="btn btn-primary px-5">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // JS 1: Live Image Preview
    document.getElementById('imageInput').onchange = function (evt) {
        const [file] = this.files;
        if (file) {
            const preview = document.getElementById('imagePreview');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    };

    // JS 2: Prevent Double Submissions
    document.getElementById('editForm').onsubmit = function() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerHTML = 'Saving...';
    };
</script>
{% endblock %}
