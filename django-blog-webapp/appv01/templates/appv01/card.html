<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog Feed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Inter', sans-serif;
            padding-top: 20px;
        }

        .blog-card {
            max-width: 600px;
            /* Standard feed width */
            margin: 0 auto 20px auto;
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            overflow: hidden;
        }

        /* Top User Info */
        .card-header-user {
            padding: 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #efefef;
        }

        /* Content Area */
        .card-body-custom {
            padding: 16px;
        }

        .blog-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #262626;
        }

        .blog-description {
            font-size: 0.95rem;
            color: #4a4a4a;
            line-height: 1.5;
        }

        /* Bottom Action Bar (The Instagram Style) */
        .action-bar {
            padding: 12px 16px;
            border-top: 1px solid #efefef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .engagement-btns {
            display: flex;
            gap: 20px;
        }

        .action-btn {
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #262626;
            padding: 0;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.7;
        }

        .btn-expand {
            background-color: #000;
            color: #fff;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
        }

        /* Responsive Fix */
        @media (max-width: 480px) {
            .blog-card {
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="blog-card shadow-sm">
            <div class="card-header-user">
                <img src="https://ui-avatars.com/api/?name={{ post.author }}&background=random"
                    class="rounded-circle me-2" width="32" height="32">
                <div>
                    <span class="fw-bold d-block" style="font-size: 0.9rem;">{{ post.author }}</span>
                    <small class="text-muted" style="font-size: 0.75rem;">{{ post.date_posted }}</small>
                </div>
            </div>

            <div class="card-body-custom">
                <h3 class="blog-title">{{ post.title }}</h3>
                <p class="blog-description">{{ post.content }}</p>
                <div class="mb-2">
                    {% for tag in post.tags %}
                    <span class="badge bg-light text-dark border">#{{ tag }}</span>
                    {% endfor %}
                </div>
            </div>

            <div class="action-bar">
                <div class="engagement-btns">
                    <button class="action-btn">
                        <svg aria-label="Like" height="22" role="img" viewBox="0 0 24 24" width="22">
                            <path
                                d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.185 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.252.339.696.339.948 0a4.21 4.21 0 0 1 3.961-1.941Z"
                                fill="none" stroke="currentColor" stroke-width="2"></path>
                        </svg>
                        <span>{{ post.likes }}</span>
                    </button>

                    <button class="action-btn">
                        <svg aria-label="Comment" height="22" role="img" viewBox="0 0 24 24" width="22">
                            <path d="M20.656 17.008a9.993 9.993 0 1 0-3.59 3.615L22 22Z" fill="none"
                                stroke="currentColor" stroke-width="2"></path>
                        </svg>
                        <span>{{ post.comments }}</span>
                    </button>
                </div>
                <a href="#" class="btn-expand">Expand More</a>
            </div>
        </div>

    </div>

</body>

</html>
