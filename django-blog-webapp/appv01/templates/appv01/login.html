{% extends 'appv01/navbar.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="{% static 'login.js' %}" defer></script>
<style>
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 90vh;
        background-color: #ffffff;
        font-family: 'Inter', sans-serif;
    }

    .login-container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
    }

    .brand-section {
        margin-bottom: 40px;
    }

    .brand-logo {
        background-color: #003d3d;
        color: white;
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        font-size: 24px;
        margin-bottom: 20px;
    }

    .login-container h2 {
        font-weight: 700;
        font-size: 28px;
        color: #111;
        margin-bottom: 10px;
    }

    .login-container p.subtitle {
        color: #666;
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 30px;
    }

    .input-group-custom {
        position: relative;
        margin-bottom: 20px;
    }

    .input-group-custom label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 8px;
        color: #333;
    }

    .input-group-custom i {
        position: absolute;
        left: 15px;
        top: 38px;
        color: #003d3d;
        font-size: 18px;
    }

    .form-input {
        width: 100%;
        padding: 12px 15px 12px 45px;
        border: 1.5px solid #d1d5db;
        border-radius: 10px;
        outline: none;
        font-size: 14px;
        transition: border-color 0.2s;
    }

    .form-input:focus {
        border-color: #003d3d;
    }

    .forgot-pass {
        display: block;
        text-align: right;
        font-size: 12px;
        color: #003d3d;
        font-weight: 600;
        text-decoration: none;
        margin-top: -10px;
        margin-bottom: 25px;
    }

    .btn-signin {
        width: 100%;
        background-color: #003d3d;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        margin-bottom: 20px;
    }

    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        color: #999;
        font-size: 12px;
        margin: 20px 0;
    }

    .divider::before, .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #eee;
    }

    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }

    .btn-google {
        width: 100%;
        background-color: white;
        border: 1px solid #d1d5db;
        padding: 12px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        color: #333;
    }

    .footer-text {
        text-align: center;
        margin-top: 30px;
        font-size: 14px;
        color: #666;
    }

    .footer-text a {
        color: #003d3d;
        font-weight: 700;
        text-decoration: none;
    }
</style>

<div class="login-wrapper">
    <div class="login-container">
        <div class="brand-section">
            <div class="brand-logo">
                <i class="bi bi-code-slash"></i>
            </div>
            <h2>Welcome Back!</h2>
            <p class="subtitle">Sign in to access your dashboard and continue optimizing your dev process.</p>
        </div>

        <form id="loginForm">
            {% csrf_token %}
            <div class="input-group-custom">
                <label>Email</label>
                <i class="bi bi-envelope"></i>
                <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required>
            </div>

            <div class="input-group-custom">
                <label>Password</label>
                <i class="bi bi-lock"></i>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <a href="#" class="forgot-pass">Forgot Password?</a>

            <button type="submit" id="submitBtn" class="btn-signin">Sign In</button>
        </form>

        <div class="divider">OR</div>

        <a href="#" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="Google">
            Continue with Google
        </a>

        <div class="footer-text">
            Don't have an Account? <a href="{% url 'registration' %}">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
