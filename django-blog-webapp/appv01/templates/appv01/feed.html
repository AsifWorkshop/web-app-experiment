{% extends 'appv01/navbar.html' %}
{% load static %}
{% block content %}

<script src="{% static 'commentcount.js' %}" defer></script>
<div class="feed-container container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            
            {% for post in posts %}
                {% include 'appv01/cardpng.html' %}
            {% empty %}
                <div class="text-center py-5">
                    <p class="text-muted fs-5">No posts found. Start the conversation!</p>
                </div>
            {% endfor %}
            
        </div>
    </div>
</div>

<style>
    /* Fixed navbar offset */
    .feed-container {
        padding-top: 20px;
        min-height: 100vh;
    }
    
    /* Smooth entry animation */
    .feed-container {
        animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>
{% endblock %}
