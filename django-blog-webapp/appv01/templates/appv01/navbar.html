<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevBlog{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }

        .navbar {
            padding: 0.8rem 0;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Light Blue for Create Post */
        .btn-create-post {
            color: #0d6efd !important;
            background-color: #e7f1ff;
            border-radius: 8px;
            font-weight: 600 !important;
            transition: all 0.3s ease;
        }

        .btn-create-post:hover {
            background-color: #0d6efd;
            color: white !important;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .search-input {
            width: 250px;
            transition: width 0.4s ease-in-out;
        }

        .search-input:focus {
            width: 300px;
            border-color: #198754;
        }

        .nav-link {
            font-weight: 500;
        }

        .auth-buttons .btn {
            font-size: 0.85rem;
            border-radius: 8px;
            font-weight: 600;
        }

        @media (max-width: 991px) {
            .search-input { width: 100% !important; margin-top: 10px; }
            .auth-buttons { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg border-bottom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" style="letter-spacing: -1px;">DevBlog</a>

            <button class="navbar-toggler shadow-none border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'feed' %}">Feed</a>
                    </li>

                    <li class="nav-item">
                        {% if user.is_authenticated %}
                            <a class="nav-link btn-create-post px-3 mx-lg-2" href="{% url 'create_post' %}">Create Post</a>
                        {% else %}
                            <a class="nav-link btn-create-post px-3 mx-lg-2" href="javascript:void(0);" onclick="alert('Please log in to create a post!');">Create Post</a>
                        {% endif %}
                    </li>
                </ul>

                <div class="d-flex flex-column flex-lg-row align-items-center gap-3">
                    <form class="d-flex" role="search" method="GET" action="#">
                        <input class="form-control me-2 shadow-none search-input" type="search"
                            placeholder="Search username or blog title..." aria-label="Search">
                    </form>

                    <div class="auth-buttons">
                        {% if user.is_authenticated %}
                            <div class="d-flex align-items-center gap-3">
                                <span class="text-muted small d-none d-xl-inline">Hi, <strong>{{ user.username }}</strong></span>
                                <form action="#" method="POST" class="m-0">
                                    {% csrf_token %}
                                    <button class="btn btn-outline-danger btn-sm px-3" type="submit">Logout</button>
                                </form>
                            </div>
                        {% else %}
                            <a href="{% url 'login' %}" class="btn btn-success btn-sm px-4">Login / Signup</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
