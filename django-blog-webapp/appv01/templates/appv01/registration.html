{% extends 'appv01/navbar.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="{% static 'register.js' %}" defer></script>
<style>
    .signup-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #ffffff;
        font-family: 'Inter', sans-serif;
        padding: 50px 0;
    }

    .signup-container {
        width: 100%;
        max-width: 450px; /* Slightly wider to accommodate the side-by-side names */
        padding: 20px;
    }

    .brand-logo {
        background-color: #003d3d;
        color: white;
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        font-size: 24px;
        margin-bottom: 20px;
    }

    .signup-container h2 {
        font-weight: 700;
        font-size: 28px;
        color: #111;
        margin-bottom: 8px;
    }

    .subtitle {
        color: #666;
        font-size: 14px;
        margin-bottom: 25px;
    }

    /* Side-by-side layout for First/Last Name */
    .name-row {
        display: flex;
        gap: 15px;
    }

    .input-group-custom {
        position: relative;
        margin-bottom: 18px;
        flex: 1;
    }

    .input-group-custom label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        margin-bottom: 8px;
        color: #333;
    }

    .input-group-custom i {
        position: absolute;
        left: 15px;
        top: 38px;
        color: #003d3d;
        font-size: 18px;
    }

    .form-input {
        width: 100%;
        padding: 12px 15px 12px 45px;
        border: 1.5px solid #d1d5db;
        border-radius: 10px;
        outline: none;
        font-size: 14px;
        transition: border-color 0.2s;
    }

    .form-input:focus {
        border-color: #003d3d;
    }

    .btn-signup {
        width: 100%;
        background-color: #003d3d;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        margin-top: 10px;
    }

    .footer-text {
        text-align: center;
        margin-top: 25px;
        font-size: 14px;
        color: #666;
    }

    .footer-text a {
        color: #003d3d;
        font-weight: 700;
        text-decoration: none;
    }
</style>

<div class="signup-wrapper">
    <div class="signup-container">
        <div class="brand-logo">
            <i class="bi bi-person-plus-fill"></i>
        </div>
        <h2>Create Account</h2>
        <p class="subtitle">Join the community and start sharing your logic.</p>

        <form id="registrationForm">
            {% csrf_token %}
            
            <div class="name-row">
                <div class="input-group-custom">
                    <label>First Name</label>
                    <i class="bi bi-person"></i>
                    <input type="text" id="first_name" name="first_name" class="form-input" placeholder="First" required>
                </div>
                <div class="input-group-custom">
                    <label>Last Name</label>
                    <i class="bi bi-person"></i>
                    <input type="text" id="last_name" name="last_name" class="form-input" placeholder="Last" required>
                </div>
            </div>

            <div class="input-group-custom">
                <label>Username</label>
                <i class="bi bi-at"></i>
                <input type="text" id="username" name="username" class="form-input" placeholder="Choose a unique username" required>
            </div>

            <div class="input-group-custom">
                <label>Email Address</label>
                <i class="bi bi-envelope"></i>
                <input type="email" id="email" name="email" class="form-input" placeholder="name@example.com" required>
            </div>

            <div class="input-group-custom">
                <label>Password</label>
                <i class="bi bi-lock"></i>
                <input type="password" id="password" name="password" class="form-input" placeholder="Create a strong password" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-signup">Create Account</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="{% url 'login' %}">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
